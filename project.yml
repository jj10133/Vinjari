name: App
include:
  - app/addons/addons.yml

packages:
  BareKit:
    url: https://github.com/holepunchto/bare-kit-swift
    branch: main
  BareRPC:
    url: https://github.com/holepunchto/bare-rpc-swift
    branch: main

targets:
  App:
    type: application
    supportedDestinations: [macOS]
    deploymentTarget: 26.0
    settings:
      base:
        PRODUCT_NAME: Vinjari
        PRODUCT_BUNDLE_IDENTIFIER: to.foss.vinjari
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        ARCHS: arm64
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS: x86_64
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES

      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          VALIDATE_PRODUCT: NO
          VALIDATE_WORKSPACE: NO
          OTHER_CODE_SIGN_FLAGS: "--deep --no-strict"
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGNING_REQUIRED: YES
          VALIDATE_PRODUCT: YES

    info:
      path: app/Info.plist
    entitlements:
      path: app/App.entitlements
      properties:
        com.apple.security.cs.allow-jit: true

    dependencies:
      - framework: app/frameworks/BareKit.xcframework
      - package: BareKit
      - package: BareRPC

    sources:
      - path: app/App.swift
      - path: app/AppDelegate.swift
      - path: app/Vinjari.icon

      - path: app/app.bundle
        optional: true

      - path: app/js/app.js
        group: app/js

      - path: app/Core/HyperSchemeHandler.swift
        group: app/Core
      - path: app/Core/BareRuntime.swift
      - path: app/Core/RPCClient.swift
      - path: app/Core/DriveService.swift
      - path: app/Core/BrowserViewModel.swift
      - path: app/Core/BrowserTab.swift
      - path: app/Core/HyperNavigationDecider.swift
      - path: app/Core/AppModel.swift

      - path: app/Core/Root/ContentView.swift
        group: app/Core/Root

    scheme:
      preActions:
        - name: Link & pack
          script: |

            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-link" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --out ${PWD}/app/addons/ \
              ${PWD}

            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-pack" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --linked \
              --base ${PWD} \
              --out ${PWD}/app/app.bundle \
              ${PWD}/app/js/app.js
